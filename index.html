<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crystal Quigley</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://kit.fontawesome.com/1e2d542018.js" crossorigin="anonymous"></script>
</head>

<body>
  <section id="search">
    <nav>
      <div class="personal__logo">Learn the deets</div>
      <ul class="nav__link--list">
        <li class="nav__link">
          <a href="#languages" class="
                nav__link--anchor
                link__hover-effect
                link__hover-effect--black 
              ">Home</a>
        </li>
        <li class="nav__link">
          <a href="#projects" class="
                nav__link--anchor
                link__hover-effect
                link__hover-effect--black 
              ">Search Heroes</a>
        </li>
        <li class-="nav__link">
          <a href="mailto:crystalquigley@example.com" class="
                nav__link--anchor
                nav__link--anchor-primary 
              ">Contact</a>
        </li>
      </ul>
    </nav>
    <div class="flex flex-1">
      <div class="search__info row">
        <div class="search__info--container">
          <figure class="search__picture--mask">
            <img src="./assets/superhero.png" class="search__picture" alt="profile picture">
          </figure>
          <h1 class="search__info--title">
            <span class="text--purple">The Best Hero Search</span>
          </h1>
          <p class="search__info--para">A <strong class="text--purple">Super Hero </strong>trivia enthusiasts dream.
          </p>
        </div>
      </div>
    </div>
  </section>
  <footer>
    <div class="row footer__row">
      <a href="#" class="footer__anchor">
    
        <span class="footer__logo--popper">
          Top
          <i class="fa-solid fa-arrow-up"></i>
        </span>
      </a>
     
      <div class="footer__copyright">Copyright © 2026 Crystal Quigley. All rights reserved.</div>
    </div>
    
  </footer>
  
</body>

</html>
